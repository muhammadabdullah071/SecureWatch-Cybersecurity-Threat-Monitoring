version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: securewatch-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: securewatch
      POSTGRES_USER: securewatch_user
      POSTGRES_PASSWORD: securewatch_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securewatch_user -d securewatch"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: securewatch-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://securewatch_user:securewatch_pass@postgres:5432/securewatch
      JWT_SECRET: change-this-to-a-random-secret-in-production
      JWT_REFRESH_SECRET: change-this-to-another-random-secret-in-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:5173
      PORT: 3001
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: securewatch-ui
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL: /api
    ports:
      - "80:80"

  # Run once to setup database
  db-setup:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: securewatch-db-setup
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://securewatch_user:securewatch_pass@postgres:5432/securewatch
    command: >
      sh -c "npx prisma generate && npx prisma db push && npx tsx prisma/seed.ts"

volumes:
  postgres_data:
